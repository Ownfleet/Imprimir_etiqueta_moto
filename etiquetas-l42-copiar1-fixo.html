<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Etiquetas L42 PRO FULL - QZ Tray</title>
<script src="https://cdn.jsdelivr.net/npm/qz-tray@2.2.4/qz-tray.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:20px;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}
.container{max-width:1200px;margin:auto;background:#fff;padding:22px;border-radius:16px;box-shadow:0 8px 25px rgba(0,0,0,.12)}
h1{text-align:center;color:#ff5a00;margin-top:0}
.sub{text-align:center;color:#555;margin-bottom:20px}
.painel{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;background:#f9fafb;border:1px solid #e5e7eb;padding:16px;border-radius:12px;margin-bottom:16px}
label{display:block;font-weight:bold;font-size:13px;margin-bottom:5px}
input,select,button,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #d1d5db;font-size:14px}
button{border:none;background:#ff5a00;color:white;font-weight:bold;cursor:pointer}
button:hover{background:#e14f00}
.btn-dark{background:#111827}.btn-green{background:#059669}.btn-blue{background:#2563eb}
.status{padding:12px;border-radius:10px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-weight:bold;margin:12px 0}
.acoes{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:15px}
textarea{min-height:120px;font-family:Consolas,monospace;resize:vertical}
.lista{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:16px;margin-top:20px}
.item{background:#f9fafb;border:1px solid #e5e7eb;border-radius:14px;padding:14px}
.item-topo{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.item-topo button{width:130px}
.preview{background:white;border:2px dashed #9ca3af;border-radius:8px;width:300px;min-height:450px;padding:18px;margin:auto}
.preview h2{margin:0 0 16px;text-align:center;font-size:30px}
.linha{display:flex;justify-content:space-between;font-size:24px;margin:9px 0}
.cabecalho{font-weight:bold;border-bottom:2px solid #111827;padding-bottom:8px;margin-bottom:12px}
.total{border-top:2px solid #111827;margin-top:18px;padding-top:12px;font-size:24px;font-weight:bold;display:flex;justify-content:space-between}
.obs{font-size:13px;color:#6b7280;line-height:1.4}
.alerta{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46}
</style>
</head>
<body>
<div class="container">
<h1>Impressão de Etiquetas - L42 PRO FULL</h1>
<div class="sub">Procura automática: ELGIN L42PRO FULL (Copiar 1)</div>

<div class="painel">
<div><label>Arquivo CSV/TXT</label><input type="file" id="arquivo" accept=".csv,.txt"></div>
<div><label>Impressora selecionada</label><select id="impressoras"></select></div>
<div><label>Reconectar / Procurar</label><button onclick="conectarQZ()">Procurar Impressora</button></div>
<div><label>Largura mm</label><input type="number" id="largura" value="100"></div>
<div><label>Altura mm</label><input type="number" id="altura" value="150"></div>
<div><label>Fonte px</label><input type="number" id="fonte" value="42"></div>
<div><label>Fonte título px</label><input type="number" id="fonteTitulo" value="54"></div>
<div><label>Espaço linhas px</label><input type="number" id="espaco" value="14"></div>
<div><label>Margem interna mm</label><input type="number" id="margem" value="8"></div>
<div><label>Cópias</label><input type="number" id="copias" value="1"></div>
</div>

<div class="status" id="status">Aguardando conexão com o QZ Tray...</div>

<div class="acoes">
<button class="btn-blue" onclick="imprimirTeste()">Sair Teste</button>
<button class="btn-green" onclick="imprimirTodas()">Imprimir Todas</button>
<button onclick="carregarExemplo()">Carregar Exemplo</button>
<button class="btn-dark" onclick="limparTudo()">Limpar</button>
</div>

<label>Ou cole os dados aqui:</label>
<textarea id="textoManual" placeholder="B-14(66)+B-15(23)+B-16(84)
B-17(76)+B-18(55)+B-19(37)"></textarea>
<br><br>
<button onclick="processarTextoManual()">Processar Texto Colado</button>
<p class="obs">Cada linha vira uma etiqueta. Exemplo: B-14(66)+B-15(23)+B-16(84).</p>
<hr>
<div id="lista" class="lista"></div>
</div>

<script>
var IMPRESSORA_PADRAO = "ELGIN L42PRO FULL (Copiar 1)";
var etiquetas = [];

qz.security.setCertificatePromise(function(resolve, reject){ resolve(null); });
qz.security.setSignaturePromise(function(toSign){ return function(resolve, reject){ resolve(null); }; });

window.addEventListener("load", function(){ conectarQZ(); });

async function conectarQZ(){
  var status = document.getElementById("status");
  var select = document.getElementById("impressoras");

  try{
    status.className = "status";
    status.textContent = "Conectando ao QZ Tray...";

    if(!qz.websocket.isActive()){
      await qz.websocket.connect();
    }

    select.innerHTML = "";

    var impressoras = await qz.printers.find();
    var encontrada = "";

    impressoras.forEach(function(nome){
      if(nome === IMPRESSORA_PADRAO){
        encontrada = nome;
      }
    });

    if(encontrada){
      var op = document.createElement("option");
      op.value = encontrada;
      op.textContent = encontrada + " ✅";
      select.appendChild(op);

      status.className = "status alerta";
      status.textContent = "Impressora correta encontrada e selecionada: " + encontrada;
      return;
    }

    impressoras.forEach(function(p){
      var op = document.createElement("option");
      op.value = p;
      op.textContent = p;
      select.appendChild(op);
    });

    status.textContent = "Não encontrei exatamente: " + IMPRESSORA_PADRAO + ". Selecione manualmente na lista.";

  }catch(e){
    status.className = "status";
    status.textContent = "Erro ao conectar. Verifique se o QZ Tray está aberto.";
    alert("Erro QZ: " + e);
  }
}

document.getElementById("arquivo").addEventListener("change", function(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(){ processarLinhas(reader.result); };
  reader.readAsText(file, "UTF-8");
});

function processarTextoManual(){ processarLinhas(document.getElementById("textoManual").value); }

function processarLinhas(texto){
  var linhas = texto.split(/\r?\n/).map(function(l){ return l.trim(); }).filter(function(l){ return l !== ""; });
  etiquetas = linhas.map(function(l){ return extrairItens(l); }).filter(function(itens){ return itens.length > 0; });
  mostrarLista();
  document.getElementById("status").textContent = etiquetas.length + " etiqueta(s) carregada(s). Impressora: " + document.getElementById("impressoras").value;
}

function extrairItens(linha){
  var regex = /([A-Z]-\d+)\((\d+)\)/g;
  var itens = [];
  var match;
  while((match = regex.exec(linha)) !== null){
    itens.push({ cluster: match[1], total: Number(match[2]) });
  }
  return itens;
}

function totalGeral(itens){
  return itens.reduce(function(soma, item){ return soma + item.total; }, 0);
}

function mostrarLista(){
  var lista = document.getElementById("lista");
  lista.innerHTML = "";

  if(etiquetas.length === 0){
    lista.innerHTML = "<p>Nenhuma etiqueta carregada.</p>";
    return;
  }

  etiquetas.forEach(function(itens, index){
    var div = document.createElement("div");
    div.className = "item";
    div.innerHTML =
      '<div class="item-topo"><strong>Etiqueta ' + (index + 1) + '</strong>' +
      '<button onclick="imprimirUma(' + index + ')">Imprimir</button></div>' +
      previewHTML(itens);
    lista.appendChild(div);
  });
}

function previewHTML(itens){
  var html = '<div class="preview"><h2>ROTA</h2>';
  html += '<div class="linha cabecalho"><span>CLUSTER</span><span>TOTAL</span></div>';
  itens.forEach(function(i){
    html += '<div class="linha"><span>' + i.cluster + '</span><span>' + i.total + '</span></div>';
  });
  html += '<div class="total"><span>TOTAL</span><span>' + totalGeral(itens) + '</span></div></div>';
  return html;
}

function criarPaginaEtiqueta(itens){
  var largura = Number(document.getElementById("largura").value);
  var altura = Number(document.getElementById("altura").value);
  var fonte = Number(document.getElementById("fonte").value);
  var fonteTitulo = Number(document.getElementById("fonteTitulo").value);
  var espaco = Number(document.getElementById("espaco").value);
  var margem = Number(document.getElementById("margem").value);

  var doc = document.implementation.createHTMLDocument("etiqueta");
  var style = doc.createElement("style");
  style.textContent =
    "@page{size:" + largura + "mm " + altura + "mm;margin:0;}" +
    "html,body{width:" + largura + "mm;height:" + altura + "mm;margin:0;padding:0;font-family:Arial,sans-serif;color:#000;background:#fff;}" +
    ".etiqueta{width:" + largura + "mm;height:" + altura + "mm;padding:" + margem + "mm;box-sizing:border-box;}" +
    ".titulo{text-align:center;font-size:" + fonteTitulo + "px;font-weight:900;margin-bottom:22px;}" +
    ".linha{display:flex;justify-content:space-between;align-items:center;font-size:" + fonte + "px;font-weight:800;margin-bottom:" + espaco + "px;}" +
    ".cabecalho{border-bottom:4px solid #000;padding-bottom:12px;margin-bottom:18px;}" +
    ".total{border-top:4px solid #000;padding-top:16px;margin-top:28px;}";
  doc.head.appendChild(style);

  var etiqueta = doc.createElement("div");
  etiqueta.className = "etiqueta";

  var titulo = doc.createElement("div");
  titulo.className = "titulo";
  titulo.textContent = "ROTA";
  etiqueta.appendChild(titulo);

  var cab = doc.createElement("div");
  cab.className = "linha cabecalho";
  cab.innerHTML = "<span>CLUSTER</span><span>TOTAL</span>";
  etiqueta.appendChild(cab);

  itens.forEach(function(i){
    var linha = doc.createElement("div");
    linha.className = "linha";

    var c = doc.createElement("span");
    c.textContent = i.cluster;

    var t = doc.createElement("span");
    t.textContent = i.total;

    linha.appendChild(c);
    linha.appendChild(t);
    etiqueta.appendChild(linha);
  });

  var total = doc.createElement("div");
  total.className = "linha total";
  total.innerHTML = "<span>TOTAL</span><span>" + totalGeral(itens) + "</span>";
  etiqueta.appendChild(total);

  doc.body.appendChild(etiqueta);
  return "<!DOCTYPE html>" + doc.documentElement.outerHTML;
}

async function imprimirTeste(){
  await imprimirHTML([criarPaginaEtiqueta([{cluster:"TESTE", total:123},{cluster:"L42", total:456}])]);
}

async function imprimirUma(index){
  await imprimirHTML([criarPaginaEtiqueta(etiquetas[index])]);
}

async function imprimirTodas(){
  if(etiquetas.length === 0){ alert("Nenhuma etiqueta carregada."); return; }
  var htmls = etiquetas.map(function(itens){ return criarPaginaEtiqueta(itens); });
  await imprimirHTML(htmls);
}

async function imprimirHTML(listaHTML){
  try{
    if(!qz.websocket.isActive()){ await conectarQZ(); }

    var impressora = document.getElementById("impressoras").value;

    if(!impressora){
      alert("Selecione uma impressora.");
      return;
    }

    if(impressora !== IMPRESSORA_PADRAO){
      var confirmar = confirm("A impressora selecionada não é a padrão. Selecionada: " + impressora + "\\nDeseja imprimir mesmo assim?");
      if(!confirmar) return;
    }

    var config = qz.configs.create(impressora, {
      copies: Number(document.getElementById("copias").value) || 1,
      units: "mm",
      size: {
        width: Number(document.getElementById("largura").value),
        height: Number(document.getElementById("altura").value)
      },
      margins: 0,
      colorType: "grayscale"
    });

    var dados = listaHTML.map(function(h){
      return { type: "pixel", format: "html", flavor: "plain", data: h };
    });

    document.getElementById("status").textContent = "Enviando para: " + impressora + "...";

    await qz.print(config, dados);

    document.getElementById("status").className = "status alerta";
    document.getElementById("status").textContent = "Enviado para impressão: " + impressora;

  }catch(e){
    alert("Erro ao imprimir: " + e);
    document.getElementById("status").textContent = "Erro ao imprimir: " + e;
  }
}

function carregarExemplo(){
  document.getElementById("textoManual").value =
    "B-14(66)+B-15(23)+B-16(84)\n" +
    "B-17(76)+B-18(55)+B-19(37)\n" +
    "B-20(63)+B-21(48)+B-22(39)\n" +
    "B-25(37)+B-26(14)+B-27(69)";
  processarTextoManual();
}

function limparTudo(){
  etiquetas = [];
  document.getElementById("arquivo").value = "";
  document.getElementById("textoManual").value = "";
  document.getElementById("lista").innerHTML = "";
  document.getElementById("status").className = "status";
  document.getElementById("status").textContent = "Tudo limpo.";
}
</script>
</body>
</html>
